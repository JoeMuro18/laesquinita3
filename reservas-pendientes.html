<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas Pendientes - La Esquinita.pe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .panel-header {
            background-color: #d12c42;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #000;
        }
        .panel-logo { font-size: 28px; font-weight: 800; color: #fff; margin: 0; font-style: italic; }
        .panel-logo a { color: #fff; text-decoration: none; transition: opacity 0.2s; }
        .panel-logo a:hover { opacity: 0.85; }
        .panel-sub { font-size: 14px; font-weight: 700; color: #f1df22; margin-top: 4px; }
        .panel-nav-links { display: flex; align-items: center; gap: 20px; list-style: none; margin: 0; padding: 0; }
        .panel-nav-links a { color: #fff; text-decoration: none; font-weight: 700; font-size: 15px; padding: 8px 16px; border-radius: 6px; }
        .panel-nav-links a.active { background-color: #f1df22; color: #000; border: 2px solid #000; box-shadow: 2px 2px 0px #000; }
        
        .panel-container { max-width: 1200px; width: 95%; margin: 40px auto; }
        .panel-welcome-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 35px; }
        .panel-main-title { font-size: 28px; font-weight: 800; text-decoration: underline; }
        .panel-quote { background-color: #fff; border: 2px solid #000; padding: 10px 20px; font-style: italic; font-weight: 600; max-width: 550px; border-radius: 4px; }
        .panel-quote span { color: #d12c42; }

        .reserva-item-row {
            background-color: #ffffff;
            border: 2px solid #000;
            border-radius: 12px;
            padding: 18px 25px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        .reserva-user-icon { font-size: 28px; border: 2px solid #000; width: 55px; height: 55px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: #fff; }
        
        .reserva-badge-rosa {
            background-color: #fce4d6; 
            border: 2px solid #000;
            border-radius: 25px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            flex: 1;
        }
        .reserva-badge-rosa.cliente { flex: 1.3; } 
        
        .btn-reserva-lista {
            background-color: #25d366; 
            color: #fff;
            border: 2px solid #000;
            border-radius: 25px;
            padding: 10px 18px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 2px 2px 0px #000;
            transition: all 0.1s ease;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-reserva-lista:hover { background-color: #20ba5a; transform: scale(1.02); }
        .sin-reservas-box { text-align: center; padding: 50px; border: 2px dashed #000; border-radius: 12px; font-size: 18px; font-weight: 700; background: #fafafa; }
    </style>
</head>
<body>

<header class="panel-header" style="background-color: #d12c42; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #000; font-family: 'Arial', sans-serif; box-sizing: border-box; width: 100%;">
    <div style="flex: 0 0 20%; min-width: 180px;">
        <h1 class="panel-logo"><a href="index.html">La Esquinita.pe</a></h1>
        <div class="panel-sub" style="font-size: 12px; font-weight: 700; color: #f1df22; margin-top: 2px; text-transform: uppercase;">PÁGINA DEL VENDEDOR</div>
    </div>
    
    <div style="flex: 0 0 80%; display: flex; align-items: center; justify-content: flex-end; gap: 20px;">
        <ul class="panel-nav-links" style="display: flex; align-items: center; gap: 8px; list-style: none; margin: 0; padding: 0; flex-wrap: nowrap;">
            <li><a href="pedidos-pendientes.html" style="color: #fff; text-decoration: none; font-weight: 700; font-size: 13.5px; padding: 8px 12px; border-radius: 6px; white-space: nowrap; display: inline-block;">Pedidos pendientes</a></li>
            <li><a href="pedidos-realizados.html" style="color: #fff; text-decoration: none; font-weight: 700; font-size: 13.5px; padding: 8px 12px; border-radius: 6px; white-space: nowrap; display: inline-block;">Pedidos realizados</a></li>
            <li><a href="estadisticas.html" style="color: #fff; text-decoration: none; font-weight: 700; font-size: 13.5px; padding: 8px 12px; border-radius: 6px; white-space: nowrap; display: inline-block;">Estadísticas</a></li>
            <li><a href="reservas-pendientes.html" class="active" style="text-decoration: none; font-weight: 700; font-size: 13.5px; padding: 8px 12px; border-radius: 6px; white-space: nowrap; display: inline-block;">Reservas pendientes</a></li>
            <li><a href="reservas-realizadas.html" style="color: #fff; text-decoration: none; font-weight: 700; font-size: 13.5px; padding: 8px 12px; border-radius: 6px; white-space: nowrap; display: inline-block;">Reservas realizadas</a></li>
            <li><a href="reseñas.html" style="color: #fff; text-decoration: none; font-weight: 700; font-size: 13.5px; padding: 8px 12px; border-radius: 6px; white-space: nowrap; display: inline-block;">Reseñas</a></li>
        </ul>

        <div style="background: #111; border: 2px solid #000; box-shadow: 2px 2px 0px #000; border-radius: 20px; padding: 5px; display: flex; align-items: center; justify-content: center; width: 65px; height: 34px; box-sizing: border-box; flex-shrink: 0;">
            <button id="btnSwitchTienda" onclick="alternarEstadoTienda()" style="background: #3a1b1b; border: 2px solid #ff4d4d; width: 100%; height: 100%; border-radius: 15px; cursor: pointer; position: relative; transition: all 0.25s ease; padding: 0; outline: none;">
                <div id="circuloSwitch" style="background: #fff; width: 16px; height: 16px; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94); display: flex; align-items: center; justify-content: center; box-shadow: 0px 1px 3px rgba(0,0,0,0.4);">
                    <div id="ledPunto" style="width: 6px; height: 6px; border-radius: 50%; background: #ff4d4d; transition: background 0.25s;"></div>
                </div>
            </button>
        </div>
    </div>
</header>

<script>
    function alternarEstadoTienda() {
        let estadoActual = localStorage.getItem("estadoTiendaEsquinita") || "CERRADO";
        let nuevoEstado = (estadoActual === "ABIERTO") ? "CERRADO" : "ABIERTO";
        
        localStorage.setItem("estadoTiendaEsquinita", nuevoEstado);
        actualizarInterfazSwitch(nuevoEstado);
    }

    function actualizarInterfazSwitch(estado) {
        const btn = document.getElementById("btnSwitchTienda");
        const circulo = document.getElementById("circuloSwitch");
        const led = document.getElementById("ledPunto");

        if (estado === "ABIERTO") {
            btn.style.backgroundColor = "#1b3a24"; 
            btn.style.borderColor = "#2ecc71";     
            circulo.style.left = "31px";            
            led.style.background = "#2ecc71";       
            circulo.style.boxShadow = "0px 0px 6px #2ecc71";
        } else {
            btn.style.backgroundColor = "#3a1b1b"; 
            btn.style.borderColor = "#ff4d4d";     
            circulo.style.left = "2px";             
            led.style.background = "#ff4d4d";       
            circulo.style.boxShadow = "0px 1px 3px rgba(0,0,0,0.4)";
        }
    }

    window.addEventListener("DOMContentLoaded", () => {
        let estadoGuardado = localStorage.getItem("estadoTiendaEsquinita") || "CERRADO";
        actualizarInterfazSwitch(estadoGuardado);
    });
</script>

    <main class="panel-container">
        <div class="panel-welcome-row">
            <h2 class="panel-main-title">Reservas pendientes</h2>
            <div class="panel-quote">"Tu esfuerzo diario, nuestro orgullo. <span>Gestiona tus ventas y haz crecer el sabor que nos une</span>"</div>
        </div>

        <div id="listaReservasContenedor"></div>
    </main>

    <script>
        function cargarReservasPendientes() {
            const contenedor = document.getElementById("listaReservasContenedor");
            const pendientes = JSON.parse(localStorage.getItem("reservasEsquinita")) || [];

            if (pendientes.length === 0) {
                contenedor.innerHTML = `<div class="sin-reservas-box"><i class="fa-solid fa-calendar-check" style="margin-bottom:10px; display:block; font-size:24px; color:#d12c42;"></i>No hay reservas pendientes por atender.</div>`;
                return;
            }

            contenedor.innerHTML = "";
            pendientes.forEach(reserva => {
                contenedor.innerHTML += `
                    <div class="reserva-item-row" id="${reserva.id}">
                        <div class="reserva-user-icon"><i class="fa-solid fa-user"></i></div>
                        
                        <div class="reserva-badge-rosa cliente">
                            ${reserva.cliente}<br>
                            <span style="font-weight:500; font-size:13px; color:#333;">${reserva.telefono}</span>
                        </div>
                        
                        <div class="reserva-badge-rosa">${reserva.fecha}</div>
                        
                        <div class="reserva-badge-rosa">${reserva.personas}</div>
                        
                        <div class="reserva-badge-rosa">${reserva.hora}</div>
                        
                        <button class="btn-reserva-lista" onclick="despacharReservaACompletadas('${reserva.id}')">
                            <i class="fa-brands fa-whatsapp" style="font-size:16px;"></i> Aceptar y Notificar
                        </button>
                    </div>`;
            });
        }

        function despacharReservaACompletadas(idReserva) {
            let pendientes = JSON.parse(localStorage.getItem("reservasEsquinita")) || [];
            const reservaACompletar = pendientes.find(r => r.id === idReserva);

            if (reservaACompletar) {
                const nombreCliente = reservaACompletar.cliente;
                const telefonoCliente = reservaACompletar.telefono;
                const fechaRes = reservaACompletar.fecha;
                const horaRes = reservaACompletar.hora;
                const personasRes = reservaACompletar.personas;

                const mensajeWhatsApp = encodeURIComponent(
`¡Hola ${nombreCliente}! Te saluda La Esquinita.pe. 🔥 Queremos informarte que tu solicitud de reserva para el día *${fechaRes}* a las *${horaRes.toUpperCase()}* para *${personasRes}* ha sido 🎉 *ACEPTADA* 🎉. ¡Nos vemos pronto para disfrutar del mejor sabor! 🍔`
                );

                let telefonoLimpio = telefonoCliente.replace(/\s+/g, '').replace(/-/g, '');
                if (!telefonoLimpio.startsWith('51') && telefonoLimpio.length === 9) {
                    telefonoLimpio = '51' + telefonoLimpio;
                }
                window.open(`https://api.whatsapp.com/send?phone=${telefonoLimpio}&text=${mensajeWhatsApp}`, '_blank');

                let realizadas = JSON.parse(localStorage.getItem("reservasRealizadasEsquinita")) || [];
                reservaACompletar.estado = "ACEPTADO"; 
                realizadas.push(reservaACompletar);
                localStorage.setItem("reservasRealizadasEsquinita", JSON.stringify(realizadas));
            }

            pendientes = pendientes.filter(r => r.id !== idReserva);
            localStorage.setItem("reservasEsquinita", JSON.stringify(pendientes));

            const elemento = document.getElementById(idReserva);
            if (elemento) {
                elemento.style.transition = "all 0.2s ease";
                elemento.style.opacity = "0";
                setTimeout(() => { cargarReservasPendientes(); }, 200);
            }
        }

        window.onload = cargarReservasPendientes;
    </script>
</body>
</html>
