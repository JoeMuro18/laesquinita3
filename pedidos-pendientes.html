<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Pendientes - La Esquinita.pe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .panel-header {
            background-color: #d12c42;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #000;
        }
        .panel-logo { font-size: 28px; font-weight: 800; color: #fff; margin: 0; font-style: italic; }
        .panel-logo a { color: #fff; text-decoration: none; transition: opacity 0.2s; }
        .panel-logo a:hover { opacity: 0.85; }
        .panel-sub { font-size: 14px; font-weight: 700; color: #f1df22; margin-top: 4px; }
        .panel-nav-links { display: flex; align-items: center; gap: 20px; list-style: none; margin: 0; padding: 0; }
        .panel-nav-links a { color: #fff; text-decoration: none; font-weight: 700; font-size: 15px; padding: 8px 16px; border-radius: 6px; }
        .panel-nav-links a.active { background-color: #f1df22; color: #000; border: 2px solid #000; box-shadow: 2px 2px 0px #000; }
        
        .panel-container { max-width: 1200px; width: 95%; margin: 40px auto; }
        .panel-welcome-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 35px; }
        .panel-main-title { font-size: 28px; font-weight: 800; text-decoration: underline; }
        .panel-quote { background-color: #fff; border: 2px solid #000; padding: 10px 20px; font-style: italic; font-weight: 600; max-width: 550px; border-radius: 4px; }
        .panel-quote span { color: #d12c42; }

        .pedido-item-row {
            background-color: #fffbfa;
            border: 2px solid #000;
            border-radius: 12px;
            padding: 18px 25px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        .pedido-user-icon { font-size: 28px; border: 2px solid #000; width: 55px; height: 55px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: #fff; }
        .pedido-data-badge-rosa {
            background-color: #fce4d6; 
            border: 2px solid #000;
            border-radius: 25px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            flex: 1;
        }
        .pedido-data-badge-rosa.address { flex: 1.4; }
        
        .btn-marcar-listo {
            background-color: #fff2cc;
            border: 2px solid #000;
            border-radius: 25px;
            padding: 10px 18px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 2px 2px 0px #000;
            transition: all 0.1s ease;
        }
        .btn-marcar-listo:hover { background-color: #f1df22; }
        .sin-pedidos-box { text-align: center; padding: 50px; border: 2px dashed #000; border-radius: 12px; font-size: 18px; font-weight: 700; background: #fafafa; }
    </style>
</head>
<body>

<header class="panel-header" style="background-color: #d12c42; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #000; font-family: 'Arial', sans-serif; box-sizing: border-box; width: 100%;">
    
    <div style="flex: 0 0 20%; min-width: 180px;">
        <h1 class="panel-logo"><a href="index.html">La Esquinita.pe</a></h1>
        <div class="panel-sub" style="font-size: 12px; font-weight: 700; color: #f1df22; margin-top: 2px; text-transform: uppercase;">PÁGINA DEL VENDEDOR</div>
    </div>
    
    <div style="flex: 0 0 80%; display: flex; align-items: center; justify-content: flex-end; gap: 20px;">
        
        <ul class="panel-nav-links" style="display: flex; align-items: center; gap: 8px; list-style: none; margin: 0; padding: 0; flex-wrap: nowrap;">
            <li><a href="pedidos-pendientes.html" class="active" style="text-decoration: none; font-weight: 700; font-size: 13.5px; padding: 8px 12px; border-radius: 6px; white-space: nowrap; display: inline-block;">Pedidos pendientes</a></li>
            <li><a href="pedidos-realizados.html" style="color: #fff; text-decoration: none; font-weight: 700; font-size: 13.5px; padding: 8px 12px; border-radius: 6px; white-space: nowrap; display: inline-block;">Pedidos realizados</a></li>
            <li><a href="estadisticas.html" style="color: #fff; text-decoration: none; font-weight: 700; font-size: 13.5px; padding: 8px 12px; border-radius: 6px; white-space: nowrap; display: inline-block;">Estadísticas</a></li>
            <li><a href="reservas-pendientes.html" style="color: #fff; text-decoration: none; font-weight: 700; font-size: 13.5px; padding: 8px 12px; border-radius: 6px; white-space: nowrap; display: inline-block;">Reservas pendientes</a></li>
            <li><a href="reservas-realizadas.html" style="color: #fff; text-decoration: none; font-weight: 700; font-size: 13.5px; padding: 8px 12px; border-radius: 6px; white-space: nowrap; display: inline-block;">Reservas realizadas</a></li>
            <li><a href="reseñas.html" style="color: #fff; text-decoration: none; font-weight: 700; font-size: 13.5px; padding: 8px 12px; border-radius: 6px; white-space: nowrap; display: inline-block;">Reseñas</a></li>
        </ul>

        <div style="background: #111; border: 2px solid #000; box-shadow: 2px 2px 0px #000; border-radius: 20px; padding: 5px; display: flex; align-items: center; justify-content: center; width: 65px; height: 34px; box-sizing: border-box; flex-shrink: 0;">
            <button id="btnSwitchTienda" onclick="alternarEstadoTienda()" style="background: #3a1b1b; border: 2px solid #ff4d4d; width: 100%; height: 100%; border-radius: 15px; cursor: pointer; position: relative; transition: all 0.25s ease; padding: 0; outline: none;">
                <div id="circuloSwitch" style="background: #fff; width: 16px; height: 16px; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94); display: flex; align-items: center; justify-content: center; box-shadow: 0px 1px 3px rgba(0,0,0,0.4);">
                    <div id="ledPunto" style="width: 6px; height: 6px; border-radius: 50%; background: #ff4d4d; transition: background 0.25s;"></div>
                </div>
            </button>
        </div>

    </div>
</header>

<script>
    function alternarEstadoTienda() {
        let estadoActual = localStorage.getItem("estadoTiendaEsquinita") || "CERRADO";
        let nuevoEstado = (estadoActual === "ABIERTO") ? "CERRADO" : "ABIERTO";
        
        localStorage.setItem("estadoTiendaEsquinita", nuevoEstado);
        actualizarInterfazSwitch(nuevoEstado);
    }

    function actualizarInterfazSwitch(estado) {
        const btn = document.getElementById("btnSwitchTienda");
        const circulo = document.getElementById("circuloSwitch");
        const led = document.getElementById("ledPunto");

        if (estado === "ABIERTO") {
            btn.style.backgroundColor = "#1b3a24"; 
            btn.style.borderColor = "#2ecc71";     
            circulo.style.left = "31px";            
            led.style.background = "#2ecc71";       
            circulo.style.boxShadow = "0px 0px 6px #2ecc71";
        } else {
            btn.style.backgroundColor = "#3a1b1b"; 
            btn.style.borderColor = "#ff4d4d";     
            circulo.style.left = "2px";             
            led.style.background = "#ff4d4d";       
            circulo.style.boxShadow = "0px 1px 3px rgba(0,0,0,0.4)";
        }
    }

    window.addEventListener("DOMContentLoaded", () => {
        let estadoGuardado = localStorage.getItem("estadoTiendaEsquinita") || "CERRADO";
        actualizarInterfazSwitch(estadoGuardado);
    });
</script>

    <main class="panel-container">
        <div class="panel-welcome-row">
            <h2 class="panel-main-title">Pedidos pendientes</h2>
            <div class="panel-quote">"Tu esfuerzo diario, nuestro orgullo. <span>Gestiona tus ventas y haz crecer el sabor que nos une</span>"</div>
        </div>

        <div id="listaPedidosReales"></div>
    </main>

    <script>
        // FUNCIÓN MEJORADA: Detecta si la memoria almacena la estructura estática vieja y la limpia
        function cargarPedidosReales() {
            const contenedor = document.getElementById("listaPedidosReales");
            let pendientes = JSON.parse(localStorage.getItem("pedidosEsquinita")) || [];

            // Si existen elementos antiguos que no tengan el formato correcto de IDs del sistema real, forzar limpieza.
            if (pendientes.length > 0 && (!pendientes[0].id || !pendientes[0].productos)) {
                localStorage.removeItem("pedidosEsquinita");
                pendientes = [];
            }

            if (pendientes.length === 0) {
                contenedor.innerHTML = `<div class="sin-pedidos-box"><i class="fa-solid fa-utensils" style="margin-bottom:10px; display:block; font-size:24px;"></i>No hay pedidos pendientes en cola. ¡Buen trabajo!</div>`;
                return;
            }

            contenedor.innerHTML = "";
            pendientes.forEach(pedido => {
                const precioMostrado = pedido.total || pedido.monto || pedido.precio || 0;
                const textoProductos = precioMostrado > 0 ? `${pedido.productos} <br><b>💵 Total: S/ ${parseFloat(precioMostrado).toFixed(2)}</b>` : pedido.productos;

                contenedor.innerHTML += `
                    <div class="pedido-item-row" id="${pedido.id}">
                        <div class="pedido-user-icon"><i class="fa-solid fa-user"></i></div>
                        <div class="pedido-data-badge-rosa">${textoProductos}</div>
                        <div class="pedido-data-badge-rosa address">${pedido.direccion}</div>
                        <div class="pedido-data-badge-rosa">${pedido.cliente}<br>${pedido.telefono}</div>
                        <button class="btn-marcar-listo" onclick="despacharPedidoACompletados('${pedido.id}')">Marcar pedido listo</button>
                    </div>`;
            });
        }

        function despacharPedidoACompletados(idPedido) {
            let pendientes = JSON.parse(localStorage.getItem("pedidosEsquinita")) || [];
            const pedidoAEntregar = pendientes.find(p => p.id === idPedido);

            if (pedidoAEntregar) {
                if (pedidoAEntregar.telefono) {
                    let telLimpio = pedidoAEntregar.telefono.replace(/\s+/g, '').replace(/-/g, '');
                    if (!telLimpio.startsWith('51') && telLimpio.length === 9) {
                        telLimpio = '51' + telLimpio;
                    }
                    
                    const mensajeText = `¡Hola *${pedidoAEntregar.cliente}*! 👋 ¡Buenas noticias! Tu pedido de *La Esquinita.pe* ya está listo 🍔🔥. El delivery lo está llevando en este momento hacia tu dirección: _${pedidoAEntregar.direccion}_. ¡Muchas gracias por tu compra!`;
                    const linkWhatsapp = `https://api.whatsapp.com/send?phone=${telLimpio}&text=${encodeURIComponent(mensajeText)}`;
                    
                    window.open(linkWhatsapp, '_blank');
                }

                const ahora = new Date();
                
                const fechaActual = ahora.toLocaleDateString("es-PE", {
                    day: "2-digit",
                    month: "2-digit",
                    year: "numeric"
                });
                
                const horaActual = ahora.toLocaleTimeString("es-PE", {
                    hour: "2-digit",
                    minute: "2-digit",
                    hour12: false
                });

                pedidoAEntregar.fecha = fechaActual;
                if (!pedidoAEntregar.hora) {
                    pedidoAEntregar.hora = horaActual;
                }

                let estadisticas = JSON.parse(localStorage.getItem("estadisticasEsquinita")) || { delDia: 0, deLaSemana: 0, ingresosTotales: 0, pedidosCompletados: 0 };
                const valorNumericoPedido = parseFloat(pedidoAEntregar.total || pedidoAEntregar.monto || pedidoAEntregar.precio || 0);

                if (!estadisticas.delDia) estadisticas.delDia = 0;
                if (!estadisticas.deLaSemana) estadisticas.deLaSemana = 0;
                if (!estadisticas.ingresosTotales) estadisticas.ingresosTotales = 0;
                if (!estadisticas.pedidosCompletados) estadisticas.pedidosCompletados = 0;

                estadisticas.delDia += valorNumericoPedido;
                estadisticas.deLaSemana += valorNumericoPedido;
                estadisticas.ingresosTotales += valorNumericoPedido;
                estadisticas.pedidosCompletados += 1;

                localStorage.setItem("estadisticasEsquinita", JSON.stringify(estadisticas));

                let completados = JSON.parse(localStorage.getItem("pedidosRealizadosEsquinita")) || [];
                completados.push(pedidoAEntregar);
                localStorage.setItem("pedidosRealizadosEsquinita", JSON.stringify(completados));
            }

            pendientes = pendientes.filter(p => p.id !== idPedido);
            localStorage.setItem("pedidosEsquinita", JSON.stringify(pendientes));

            const elemento = document.getElementById(idPedido);
            if (elemento) {
                elemento.style.transition = "all 0.2s ease";
                elemento.style.opacity = "0";
                setTimeout(() => { cargarPedidosReales(); }, 200);
            }
        }

        window.onload = cargarPedidosReales;
    </script>
</body>
</html>
